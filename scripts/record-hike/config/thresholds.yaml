# Phase 1 behavior scoring thresholds
behavior:
  strong_threshold: 0.75
  moderate_threshold: 0.50
  uncertain_threshold: 0.30

# Baseline multipliers for "likely hiking" detection
baseline_multipliers:
  steps_strong: 1.8        # steps > 1.8x baseline = strong signal
  steps_moderate: 1.3      # steps > 1.3x = moderate
  active_minutes_strong: 2.0
  active_minutes_moderate: 1.4
  strain_strong: 1.6
  strain_moderate: 1.1
  calories_strong: 1.5
  calories_moderate: 1.1

# Phase 2 Strava confidence thresholds
strava:
  confirmed_threshold: 0.90
  likely_threshold: 0.65

# Final classifier
classifier:
  confirmed_attended_min_confidence: 0.85
  likely_attended_min_confidence: 0.55
  likely_missed_max_confidence: 0.35
